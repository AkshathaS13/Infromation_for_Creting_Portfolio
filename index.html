<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #e6e6e6; padding: 20px;">
    <h3 style="text-align: left;"><b>To Create a Portfolio you need to provide the following information</b></h3>
    <form action="portfoli.html" method="get" autocomplete="on" style="background-color: #f2f2f2; padding: 20px; border-radius: 5px;" enctype="multipart/form-data">

        <fieldset style="text-align: left; width: 100%; border: none;">
            <legend><b>Personal Information</b></legend>
            <label for="firstname">Enter Your First Name:</label>
            <input type="text" id="firstname" name="firstname" placeholder="First Name" required><br><br>
            <label for="lastname">Enter Your Last Name:</label>
            <input type="text" id="lastname" name="lastname" placeholder="Last Name" required><br><br>
            <label for="email">Enter Valid Email:</label>
            <input type="email" id="email" name="email" placeholder="Valid Email" required><br><br>
            <label for="gender">Gender:</label>
            <label>
                <input type="radio" id="gender" name="gender" value="Male">Male
            </label>
            <label>
                <input type="radio" id="gender" name="gender" value="Female">Female
            </label><br><br>
            <label for="phone">Enter Your Phone Number:</label>
            <input type="tel" id="phone" name="phone" placeholder="Phone Number"><br><br>
            <label for="image">Upload Your Image:</label>
            <input type="file" id="image" name="image" accept="image/*, .jpg, .jpeg, .png" required><br><br>
            <label for="confirm">Selected information are correct:</label>
            <input type="checkbox" id="confirm" name="confirm" required><br><br>
        </fieldset>

        <button type="submit" style="background-color: hsl(218, 95%, 66%); color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer;">Next</button>
        <input type="reset" value="Reset" style="background-color: hsl(25, 88%, 51%); color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer;">

        <fieldset style="text-align: left; width: 100%; border: none; margin-top: 20px;">
            <legend><b>Educational Background</b></legend>
            <label for="education">Highest Level of Education:</label>
            <select id="education" name="education" required>
                <option value="">Select</option>
                <option value="highschool">High School</option>
                <option value="bachelor">Bachelor's Degree</option>
                <option value="master">Master's Degree</option>
                <option value="phd">Ph.D.</option>
            </select><br><br>
            <label for="university">University/College Name:</label>
            <input type="text" id="university" name="university" placeholder="University/College Name"><br><br>
            <label for="graduation">Year of Graduation:</label>
            <input type="number" id="graduation" name="graduation" placeholder="Year of Graduation" min="1900" max="2100"><br><br>
             <button type="submit" style="background-color: hsl(137, 96%, 29%); color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer;">Submit</button>
        <input type="reset" value="Reset" style="background-color: hsl(25, 88%, 51%); color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer;">
        </fieldset>


        <fieldset style="text-align: left; width: 100%; border: none; margin-top: 20px;">
            <legend><b>Note:</b></legend>
            <p>Please ensure that all the information provided is accurate and up-to-date. This will help us create a comprehensive and professional portfolio for you.</p>
        </fieldset>
    </form>
</body>
</html>
